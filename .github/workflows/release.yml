name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  quality:
    name: Pre-Release Quality Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run oxlint
        run: npm run lint

      - name: Run TypeScript type checking
        run: npm run typecheck

      - name: Run tests
        run: npm test -- --run

      - name: Build extension
        run: npm run build:ext

      - name: Build Next.js
        run: npm run build

  release:
    name: Create GitHub Release
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            ## Changes in ${{ github.ref }}
            
            For detailed changelog, see commits since last release.
            
            ### Testing
            - ✅ All tests passed
            - ✅ Type checking passed
            - ✅ Linting passed
            
            ### Build Artifacts
            - Backend: Next.js production build
            - Extension: Compiled TypeScript (dist/)
          draft: false
          prerelease: false

