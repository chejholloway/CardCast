name: CI Node 18 Check and Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Node version check (fast fail)
        run: |
          echo "Node version: $(node -v)"
          if [[ "$(node -v)" != v18.* ]]; then
            echo "ERROR: Node 18.x is required."; exit 1
          fi
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build Cloudflare CF worker
        run: npm run build:cf
      - name: Deploy full (guard + build + deploy + health)
        run: npm run deploy:full
