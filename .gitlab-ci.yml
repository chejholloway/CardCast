image: node:20-alpine

stages:
  - install
  - test
  - build
  - deploy

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/

.cache-node-modules:
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
    policy: pull-push

install_dependencies:
  extends: .cache-node-modules
  stage: install
  script:
    - npm ci --cache .npm --prefer-offline

security_scan:
  extends: .cache-node-modules
  stage: test
  script:
    - npm audit

lint_code:
  extends: .cache-node-modules
  stage: test
  script:
    # Runs linting, including accessibility checks with oxlint
    - npm run lint

typecheck_code:
  extends: .cache-node-modules
  stage: test
  script:
    - npm run typecheck

run_tests:
  extends: .cache-node-modules
  stage: test
  script:
    - npm run test

build_project:
  extends: .cache-node-modules
  stage: build
  script:
    - npm run build
  artifacts:
    paths:
      - .next/

deploy_to_vercel:
  stage: deploy
  script:
    - npm i -g vercel
    - vercel --prod --token=$VERCEL_TOKEN
  only:
    - main

build_and_push_docker:
  image: docker:20.10.16
  stage: deploy
  services:
    - docker:20.10.16-dind
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $CI_REGISTRY_IMAGE:latest .
    - docker push $CI_REGISTRY_IMAGE:latest
  only:
    - main
