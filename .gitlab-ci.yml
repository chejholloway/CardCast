stages:
  - build
  - test
  - deploy

variables:
  NODE_VERBOSE: '$(node -v)'

before_script:
  - node -v

build_cf:
  stage: build
  image: node:22
  script:
    - npm ci
    - npm run build:cf

deploy_cf:
  stage: deploy
  image: node:22
  script:
    - npm ci
    - npm run guard:deploy
    - npm run deploy:full
  only:
    - main
