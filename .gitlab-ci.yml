stages:
  - build
  - test
  - deploy

variables:
  NODE_VERSION: "22"

default:
  image: node:${NODE_VERSION}
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
      - .next/cache/
      - extension/dist-extension/
  before_script:
    - npm ci

build:
  stage: build
  script:
    - npm run build:ext
    - npm run build:cf
  artifacts:
    paths:
      - cf-worker.js
      - extension/dist-extension/
    expire_in: 2 hours
  variables:
    EXTENSION_SHARED_SECRET: $EXTENSION_SHARED_SECRET

deploy-worker:
  stage: deploy
  script:
    - npx wrangler deploy
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  variables:
    CLOUDFLARE_API_TOKEN: $CLOUDFLARE_API_TOKEN
    EXTENSION_SHARED_SECRET: $EXTENSION_SHARED_SECRET
  environment:
    name: production
